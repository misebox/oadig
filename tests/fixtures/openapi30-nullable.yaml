openapi: "3.0.3"
info:
  title: Nullable test
  version: "1.0"
paths:
  /items:
    get:
      operationId: getItems
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Item"
components:
  schemas:
    Item:
      type: object
      properties:
        name:
          type: string
          nullable: true
        id:
          type: integer
        age:
          type: integer
          minimum: 0
          exclusiveMinimum: true
          maximum: 120
          exclusiveMaximum: false
